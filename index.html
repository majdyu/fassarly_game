<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icon.png" type="image/png"> <!-- Chemin relatif vers l'icône -->
    <title>لعبة القرار النهائي - فسّرلي</title>
    <link rel="stylesheet" href="style2.css"> <!-- Chemin relatif vers le fichier CSS -->
</head>
<body class="body1">
    <div class="game-container">
        <!-- Conteneur pour le titre et le logo -->
        <div class="header-container">
            <h1 class="main-title">العب مع منصتنا</h1>
            <img src="logo.jpg" alt="شعار المنصة" class="platform-logo"> <!-- Chemin relatif vers le logo -->
        </div>

        <h1>لعبة القرار النهائي - العدد العشوائي</h1>
        <h4>يرجى اختيار مستوى اللعبة</h4>

        <!-- Boutons de sélection de niveau -->
        <div class="level-selection">
            <button onclick="selectLevel('easy')">سهل</button>
            <button onclick="selectLevel('medium')">متوسط</button>
            <button onclick="selectLevel('hard')">صعب</button>
        </div>
    </div>

    <script src="script.js"></script> <!-- Chemin relatif vers le fichier JS -->
</body>
</html>
